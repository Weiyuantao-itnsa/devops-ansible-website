    - name: install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: deploy website
      copy:
        src: website/
        dest: /var/www/html/
        owner: root
        group: root
        mode: '0755'

