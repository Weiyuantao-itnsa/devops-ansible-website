- name: Deploy Website 
  

  on: 
    push:
      branches:
        - main 

  jobs:
    deploy:

      runs-on: ubuntu-lastest

      steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Ansible
        run: | 
          apt update
          apt install ansible -y 

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_ras



      - name: Run Ansible
        run: | 
          ansible-playbook -i ansible/inventory.yml ansible/Nginx.yml
